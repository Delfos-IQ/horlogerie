name = "horlogerie"
main = "index.js"
compatibility_date = "2024-09-01"

# ══════════════════════════════════════════
# Deploy: cd worker && wrangler deploy
# Worker URL: https://horlogerie.pedicode-app.workers.dev
#
# REQUIRED secrets (Cloudflare dashboard → Workers → horlogerie → Settings → Variables):
#   GROQ_API_KEY   → console.groq.com (free tier, no card needed)
#
# OPTIONAL secrets (market prices via eBay):
#   EBAY_APP_ID    → developer.ebay.com → App ID (Client ID)
#   EBAY_CERT_ID   → developer.ebay.com → Cert ID (Client Secret)
#   Both free, no approval needed for Browse API read-only access.
#
# KV namespace binding:
#   Cloudflare dashboard → Storage & Databases → Workers KV
#   → Create namespace "HORLOGERIE"
#   → Workers → horlogerie → Settings → Bindings → KV Namespaces
#   → Variable name: HORLOGERIE_KV  →  Namespace: HORLOGERIE
#
# ALLOWED_ORIGINS in index.js:
#   Update ALLOWED_ORIGINS array if you deploy the app to a custom domain.
# ══════════════════════════════════════════

[[kv_namespaces]]
binding = "HORLOGERIE_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
